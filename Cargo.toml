[package]
name = "lane"
version = "0.1.0"
edition = "2024"

[lib]
name = "lane"
path = "src/lib.rs"

[[bin]]
name = "lane-server"
path = "src/main.rs"

[dependencies]
axum = "0.8.7"
serde = { version = "1.0.228", features = ["derive"] }
tokio = { version = "1.48.0", features = ["macros", "rt-multi-thread"] }

[dev-dependencies]
serde_json = "1.0.145"
tower = { version = "0.5.2", features = ["util"] }
