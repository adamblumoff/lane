name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - "codex/**"

permissions:
  contents: read

jobs:
  windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install WinFsp
        shell: pwsh
        run: |
          choco install winfsp -y --no-progress
          $dll = Join-Path ${env:ProgramFiles(x86)} "WinFsp\bin\winfsp-x64.dll"
          if (-not (Test-Path -LiteralPath $dll)) {
            throw "WinFsp DLL was not installed at $dll"
          }

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test
